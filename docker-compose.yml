# ============================================================
# Herbario Digital HEAA - Orquestación Docker para Dokploy
# ============================================================
# Variables requeridas (configurar en Dokploy > Environment):
#   APP_DOMAIN, API_DOMAIN, FRONTEND_URL, NEXT_PUBLIC_API_URL
#   DB_ROOT_PASSWORD, DB_NAME, DB_USER, DB_PASSWORD
#   JWT_SECRET
#   CLOUDINARY_CLOUD_NAME, CLOUDINARY_API_KEY, CLOUDINARY_API_SECRET

version: "3.8"

networks:
  herbario-internal:
    driver: bridge
  dokploy-network:
    external: true

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local
  logs_data:
    driver: local

services:

  # ─────────────────── Base de Datos MySQL ───────────────────
  db:
    image: mysql:8.0
    container_name: herbario-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-herbario_heaa}
      MYSQL_USER: ${DB_USER:-herbario_user}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/herbario_heaa_actualizado.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    networks:
      - herbario-internal
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "--password=${DB_ROOT_PASSWORD}",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─────────────────── Redis Cache ───────────────────
  redis:
    image: redis:7-alpine
    container_name: herbario-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - herbario-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─────────────────── Backend API (Node.js/Express) ───────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: herbario-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5001
      # Base de datos
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER:-herbario_user}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-herbario_heaa}
      # Seguridad
      JWT_SECRET: ${JWT_SECRET}
      # CORS y URLs
      FRONTEND_URL: ${FRONTEND_URL}
      CORS_ORIGIN: ${FRONTEND_URL}
      SOCKET_CORS_ORIGIN: ${FRONTEND_URL}
      CORS_CREDENTIALS: "true"
      # Cloudinary
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      CLOUDINARY_FOLDER: ${CLOUDINARY_FOLDER:-herbario}
      # Redis
      REDIS_URL: redis://redis:6379
      # Archivos
      UPLOAD_DIR: uploads
      MAX_FILE_SIZE: "10485760"
      # Rate limiting
      RATE_LIMIT_WINDOW_MS: "900000"
      RATE_LIMIT_MAX_REQUESTS: "100"
      RATE_LIMIT_STRICT_MAX: "20"
      RATE_LIMIT_LOGIN_MAX: "5"
      # Logs
      LOG_LEVEL: info
      LOG_FILE: logs/combined.log
      ERROR_LOG_FILE: logs/error.log
      # Seguridad adicional
      HELMET_ENABLED: "true"
      COMPRESSION_ENABLED: "true"
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    networks:
      - herbario-internal
      - dokploy-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:5001/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1))",
        ]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 90s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.herbario-api.rule=Host(`${API_DOMAIN}`)"
      - "traefik.http.routers.herbario-api.entrypoints=websecure"
      - "traefik.http.routers.herbario-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.herbario-api.loadbalancer.server.port=5001"
      - "traefik.docker.network=dokploy-network"
      # Redirección HTTP → HTTPS
      - "traefik.http.routers.herbario-api-http.rule=Host(`${API_DOMAIN}`)"
      - "traefik.http.routers.herbario-api-http.entrypoints=web"
      - "traefik.http.routers.herbario-api-http.middlewares=https-redirect@docker"

  # ─────────────────── Frontend (Next.js) ───────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
    container_name: herbario-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: "0.0.0.0"
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
    networks:
      - herbario-internal
      - dokploy-network
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:3000', (r) => { process.exit(r.statusCode < 400 ? 0 : 1); }).on('error', () => process.exit(1))",
        ]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.herbario-frontend.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.herbario-frontend.entrypoints=websecure"
      - "traefik.http.routers.herbario-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.herbario-frontend.loadbalancer.server.port=3000"
      - "traefik.docker.network=dokploy-network"
      # Redirección HTTP → HTTPS
      - "traefik.http.routers.herbario-frontend-http.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.herbario-frontend-http.entrypoints=web"
      - "traefik.http.routers.herbario-frontend-http.middlewares=https-redirect@docker"
