components:
  securitySchemes:
    tokenInBody:
      type: apiKey
      in: header
      name: token
      description: >-
        ⚠️ Representación para Swagger. En realidad el JWT NO va en un header: va en el campo `token` del cuerpo JSON de
        `POST /api/service`. Swagger UI no puede inyectar campos en el body, así que para probar servicios protegidos
        copia el token en el `token` del ejemplo del body.
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'Sólo para `POST /api/plantas/upload`, que sí lee `Authorization: Bearer <token>`.'
  schemas:
    ServiceRequest:
      type: object
      required:
        - service
      properties:
        service:
          type: string
          description: Nombre del servicio `modulo.accion`.
          examples:
            - plants.getAll
        data:
          type: object
          description: Parámetros del servicio.
          default: {}
        token:
          type:
            - string
            - 'null'
          description: JWT (sólo servicios protegidos).
    SuccessEnvelope:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean
          const: true
        data:
          description: Carga útil del servicio (forma variable).
        service:
          type: string
        timestamp:
          type: string
          format: date-time
        executionTime:
          type: integer
          description: ms
    ErrorEnvelope:
      type: object
      required:
        - success
      properties:
        success:
          type: boolean
          const: false
        error:
          type: string
        message:
          type: string
        code:
          type:
            - string
            - 'null'
        service:
          type: string
        timestamp:
          type: string
          format: date-time
    SystemInfo:
      type: object
      properties:
        name:
          type: string
        version:
          type: string
        description:
          type: string
        institution:
          type: string
        apiVersion:
          type: string
        endpoints:
          type: array
          items:
            type: string
    UploadResult:
      type: object
      properties:
        id:
          type:
            - integer
            - 'null'
        url:
          type: string
          format: uri
        thumbnailUrl:
          type: string
          format: uri
        filename:
          type: string
        originalName:
          type: string
        mimetype:
          type: string
        size:
          type: integer
  responses:
    BadRequest:
      description: Datos inválidos o faltantes (mensajes con "requerido"/"inválido" → 400)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            success: false
            error: El campo X es requerido
            code: null
            service: modulo.accion
    Unauthorized:
      description: Token ausente (401)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            success: false
            error: Autenticación requerida
            message: Este servicio requiere autenticación
    Forbidden:
      description: Token inválido, usuario inactivo o rol insuficiente (403)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            success: false
            error: Permisos insuficientes
            message: Se requieren permisos de administrador para este servicio
    NotFound:
      description: Recurso o servicio no encontrado (404)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            success: false
            error: Planta no encontrada
            code: null
            service: plants.getById
    Conflict:
      description: Conflicto, p. ej. clave duplicada `ER_DUP_ENTRY` (409)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            success: false
            error: El número de catálogo ya existe
            code: ER_DUP_ENTRY
    TooManyRequests:
      description: 'Rate limit excedido (429): 500 req / 5 min por IP'
      headers:
        RateLimit-Limit:
          schema:
            type: integer
          example: 500
        RateLimit-Remaining:
          schema:
            type: integer
          example: 0
        RateLimit-Reset:
          schema:
            type: integer
          example: 142
        Retry-After:
          schema:
            type: integer
          example: 142
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            success: false
            error: Demasiadas peticiones
            message: Has excedido el límite de peticiones. Intenta más tarde.
            retryAfter: 142
    InternalServerError:
      description: Error interno (500). Por defecto cuando el mensaje no encaja en 400/403/404/409.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            success: false
            error: Mensaje de error
            code: null
            service: modulo.accion
