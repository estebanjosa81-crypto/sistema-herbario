tags:
  - name: Sistema
    description: Rutas HTTP reales fuera del gateway (health, info, media).
  - name: Autenticación
    description: Login, registro, sesión y recuperación de contraseña.
  - name: Plantas
    description: CRUD y consultas del catálogo botánico (Darwin Core).
  - name: Taxonomía
    description: Familias, géneros y especies.
  - name: Ubicaciones
    description: Departamentos, municipios y sitios de colección.
  - name: Usuarios
    description: Gestión de cuentas y roles.
  - name: Dashboard
    description: Estadísticas y métricas.
  - name: Sugerencias
    description: Sugerencias ciudadanas con moderación.
  - name: Publicaciones
    description: Blog / noticias del herbario.
  - name: Configuración
    description: Ajustes del sistema.
  - name: Archivos
    description: Subida y gestión de imágenes.
  - name: Público
    description: Servicios sin autenticación para el frontend.
  - name: PQRSDF
    description: Peticiones, quejas, reclamos, sugerencias, denuncias y felicitaciones.
  - name: Validación
    description: Servicios de validación de datos.
paths:
  /health:
    get:
      tags:
        - Sistema
      summary: Estado del sistema
      operationId: health
      description: Ruta HTTP real `GET /health`. Exenta de rate limit. Devuelve estado y conexión a BD.
      responses:
        '200':
          description: Sistema operativo
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    examples:
                      - healthy
                  database:
                    type: string
                    examples:
                      - connected
                  timestamp:
                    type: string
                    format: date-time
        '500':
          $ref: '#/components/responses/InternalServerError'
  /info:
    get:
      tags:
        - Sistema
      summary: Información del sistema
      operationId: info
      description: Ruta HTTP real `GET /info`. Exenta de rate limit. Metadatos del servidor.
      responses:
        '200':
          description: Metadatos del servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemInfo'
  /api/plantas/upload:
    post:
      tags:
        - Archivos
      summary: Subir imagen de planta (multipart, Cloudinary)
      operationId: uploadPlantImage
      description: >-
        Ruta HTTP real `POST /api/plantas/upload`. **Único endpoint que autentica por header** `Authorization: Bearer
        <token>` (no por body). Requiere usuario autenticado (cualquier rol). Sube a Cloudinary o, si no está
        configurado, guarda localmente. Máx 10 MB.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - image
              properties:
                image:
                  type: string
                  format: binary
                  description: Imagen JPG/PNG/WEBP, máx 10 MB
      responses:
        '200':
          description: Imagen subida
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/UploadResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/media/plantas/{file}:
    get:
      tags:
        - Sistema
      summary: Servir imagen local
      operationId: getPlantMedia
      description: >-
        Ruta HTTP real `GET /api/media/plantas/{file}`. Sirve imágenes guardadas localmente (fallback de Cloudinary).
        Protegida contra path traversal.
      parameters:
        - name: file
          in: path
          required: true
          schema:
            type: string
          example: abc123.jpg
      responses:
        '200':
          description: Archivo de imagen
          content:
            image/*:
              schema:
                type: string
                format: binary
        '400':
          $ref: '#/components/responses/BadRequest'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/service:
    post:
      tags:
        - Autenticación
      summary: Iniciar sesión
      operationId: authLogin
      description: |-
        **Servicio:** `auth.login`

        **Ruta HTTP real:** `POST /api/service`  ·  **Método real:** `POST`

        **Autenticación:** No requiere autenticación.  **Rol:** cualquiera

        **Parámetros requeridos en `data`:** `email`, `password`

        Valida credenciales y devuelve un JWT (24 h) + datos del usuario.
      x-service-name: auth.login
      x-physical-route: POST /api/service
      x-real-http-method: POST
      x-auth-required: false
      x-role-required: null
      x-service-status: ok
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceRequest'
            example:
              service: auth.login
              data:
                email: admin@heaa.edu.co
                password: admin123
      responses:
        '200':
          description: Devuelve `{ token, user{ id, email, name, role } }`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/service#auth.register:
    post:
      tags:
        - Autenticación
      summary: Registrar usuario
      operationId: authRegister
      description: >-
        **Servicio:** `auth.register`


        **Ruta HTTP real:** `POST /api/service`  ·  **Método real:** `POST`


        **Autenticación:** No requiere autenticación.  **Rol:** cualquiera


        **Parámetros requeridos en `data`:** `email`, `password`, `name`


        Crea una cuenta. El rol SIEMPRE se fuerza a `user` (cualquier `role` enviado se ignora). `password` mínimo 6
        caracteres. `phone` es opcional.
      x-service-name: auth.register
      x-physical-route: POST /api/service
      x-real-http-method: POST
      x-auth-required: false
      x-role-required: null
      x-service-status: ok
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceRequest'
            example:
              service: auth.register
              data:
                email: eroa@itp.edu.co
                password: Segura24
                name: Esteban Roa
                phone: '3001234567'
      responses:
        '200':
          description: Devuelve `{ token, user }`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/service#auth.me:
    post:
      tags:
        - Autenticación
      summary: Perfil del usuario autenticado
      operationId: authMe
      description: |-
        **Servicio:** `auth.me`

        **Ruta HTTP real:** `POST /api/service`  ·  **Método real:** `POST`

        **Autenticación:** Requiere token (campo `token` del body).  **Rol:** cualquiera

        **Parámetros requeridos en `data`:** ninguno

        Devuelve el perfil del usuario dueño del token. Requiere token (está en SERVICES_REQUIRING_AUTH).
      x-service-name: auth.me
      x-physical-route: POST /api/service
      x-real-http-method: POST
      x-auth-required: true
      x-role-required: null
      x-service-status: ok
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceRequest'
            example:
              service: auth.me
              data: {}
              token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      responses:
        '200':
          description: Devuelve `{ id, email, name, role, avatar, phone, lastLogin, createdAt }`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - tokenInBody: []
  /api/service#auth.logout:
    post:
      tags:
        - Autenticación
      summary: Cerrar sesión
      operationId: authLogout
      description: |-
        **Servicio:** `auth.logout`

        **Ruta HTTP real:** `POST /api/service`  ·  **Método real:** `POST`

        **Autenticación:** Requiere token (campo `token` del body).  **Rol:** cualquiera

        **Parámetros requeridos en `data`:** ninguno

        Registra el logout y calcula la duración de sesión. Requiere token.
      x-service-name: auth.logout
      x-physical-route: POST /api/service
      x-real-http-method: POST
      x-auth-required: true
      x-role-required: null
      x-service-status: ok
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceRequest'
            example:
              service: auth.logout
              data: {}
              token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      responses:
        '200':
          description: Devuelve `{ message }`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - tokenInBody: []
  /api/service#auth.forgotPassword:
    post:
      tags:
        - Autenticación
      summary: Solicitar recuperación de contraseña
      operationId: authForgotPassword
      description: >-
        **Servicio:** `auth.forgotPassword`


        **Ruta HTTP real:** `POST /api/service`  ·  **Método real:** `POST`


        **Autenticación:** No requiere autenticación.  **Rol:** cualquiera


        **Parámetros requeridos en `data`:** `email`


        Genera un token de recuperación. Por seguridad responde igual exista o no el email. El envío de email está
        pendiente (TODO); en `NODE_ENV=development` devuelve `resetToken` en la respuesta.
      x-service-name: auth.forgotPassword
      x-physical-route: POST /api/service
      x-real-http-method: POST
      x-auth-required: false
      x-role-required: null
      x-service-status: ok
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceRequest'
            example:
              service: auth.forgotPassword
              data:
                email: eroa@itp.edu.co
      responses:
        '200':
          description: Devuelve `{ message, resetToken? }`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /api/service#auth.resetPassword:
    post:
      tags:
        - Autenticación
      summary: Restablecer contraseña con token · ⚠️ NO IMPLEMENTADO
      operationId: authResetPassword
      description: >-
        **Servicio:** `auth.resetPassword`


        **Ruta HTTP real:** `POST /api/service`  ·  **Método real:** `POST`


        **Autenticación:** No requiere autenticación.  **Rol:** cualquiera


        **Parámetros requeridos en `data`:** `token`, `newPassword`


        ⚠️ SIMULADO. Valida formato (`newPassword` ≥ 6) pero NO actualiza la contraseña en la base de datos todavía (la
        verificación del token y el UPDATE están como TODO en el código).
      x-service-name: auth.resetPassword
      x-physical-route: POST /api/service
      x-real-http-method: POST
      x-auth-required: false
      x-role-required: null
      x-service-status: stub
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceRequest'
            example:
              service: auth.resetPassword
              data:
                token: reset_token_aqui
                newPassword: NuevaClave24
      responses:
        '200':
          description: >-
            Responde 200 con `{ success:false, error:"Funcionalidad pendiente"|"Usar otro servicio" }` (no realiza la
            operación).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      deprecated: true
  /api/service#auth.refresh:
    post:
      tags:
        - Autenticación
      summary: Refrescar token · ⛔ NO FUNCIONAL (gateway)
      operationId: authRefresh
      description: >-
        **Servicio:** `auth.refresh`


        **Ruta HTTP real:** `POST /api/service`  ·  **Método real:** `POST`


        **Autenticación:** No requiere autenticación.  **Rol:** cualquiera


        **Parámetros requeridos en `data`:** `refreshToken`


        ⚠️ NO FUNCIONAL vía gateway. El handler está escrito al estilo Express (`req`/`res`) y devuelve datos simulados;
        al invocarse por el gateway falla. Pendiente de implementar.
      x-service-name: auth.refresh
      x-physical-route: POST /api/service
      x-real-http-method: POST
      x-auth-required: false
      x-role-required: null
      x-service-status: broken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceRequest'
            example:
              service: auth.refresh
              data:
                refreshToken: ...
      responses:
        '200':
          description: No produce una respuesta exitosa en su estado actual (ver descripción).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      deprecated: true
  /api/service#auth.changePassword:
    post:
      tags:
        - Autenticación
      summary: Cambiar contraseña · ⛔ NO FUNCIONAL (gateway)
      operationId: authChangePassword
      description: >-
        **Servicio:** `auth.changePassword`


        **Ruta HTTP real:** `POST /api/service`  ·  **Método real:** `POST`


        **Autenticación:** No requiere autenticación.  **Rol:** cualquiera


        **Parámetros requeridos en `data`:** `currentPassword`, `newPassword`


        ⚠️ NO FUNCIONAL vía gateway. Handler estilo Express (lee `req.body`/`req.user`) marcado como TODO; falla al
        llamarse por el gateway.
      x-service-name: auth.changePassword
      x-physical-route: POST /api/service
      x-real-http-method: POST
      x-auth-required: false
      x-role-required: null
      x-service-status: broken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceRequest'
            example:
              service: auth.changePassword
              data:
                currentPassword: x
                newPassword: 'y'
      responses:
        '200':
          description: No produce una respuesta exitosa en su estado actual (ver descripción).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      deprecated: true
  /api/service#auth.verifyEmail:
    post:
      tags:
        - Autenticación
      summary: Verificar email · ⛔ NO FUNCIONAL (gateway)
      operationId: authVerifyEmail
      description: |-
        **Servicio:** `auth.verifyEmail`

        **Ruta HTTP real:** `POST /api/service`  ·  **Método real:** `POST`

        **Autenticación:** No requiere autenticación.  **Rol:** cualquiera

        **Parámetros requeridos en `data`:** ninguno

        ⚠️ NO FUNCIONAL vía gateway. Handler estilo Express que lee `req.params.token` (TODO).
      x-service-name: auth.verifyEmail
      x-physical-route: POST /api/service
      x-real-http-method: POST
      x-auth-required: false
      x-role-required: null
      x-service-status: broken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceRequest'
            example:
              service: auth.verifyEmail
              data: {}
      responses:
        '200':
          description: No produce una respuesta exitosa en su estado actual (ver descripción).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      deprecated: true
  /api/service#plants.getAll:
    post:
      tags:
        - Plantas
      summary: Listar plantas con paginación y filtros
      operationId: plantsGetAll
      description: >-
        **Servicio:** `plants.getAll`


        **Ruta HTTP real:** `POST /api/service`  ·  **Método real:** `POST`


        **Autenticación:** No requiere autenticación.  **Rol:** cualquiera


        **Parámetros requeridos en `data`:** ninguno


        Listado paginado y filtrable. Filtros (todos opcionales, coincidencia parcial LIKE): `search`, `family`,
