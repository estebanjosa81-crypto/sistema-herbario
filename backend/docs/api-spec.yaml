openapi: 3.1.0
info:
  title: Herbario Digital HEAA — API (Service Gateway)
  version: 2.0.0
  summary: API de gateway de servicio único del Herbario Digital HEAA — documentada fielmente desde el código fuente.
  description: >-
    API del Sistema de Herbario Digital del Instituto Tecnológico del Putumayo.


    > **Esta especificación refleja EXACTAMENTE el código fuente.** No asume REST. No inventa endpoints. Cada servicio
    del registro `src/services/index.js` se documenta como una operación independiente, manteniendo su **ruta y método
    HTTP reales**.


    ## Arquitectura: Monolito Modular + Service Gateway (RPC sobre HTTP)


    Toda la lógica de negocio se invoca a través de **un único endpoint físico**:


    ```

    POST /api/service

    Content-Type: application/json


    {
      "service": "modulo.accion",   // p. ej. "plants.getAll"
      "data":    { ...parámetros... },
      "token":   "JWT (sólo servicios protegidos)"
    }

    ```


    El despachador (`serviceController.handleRequest`) resuelve `service` contra un **registro** `{ 'modulo.accion': fn
    }` y ejecuta `fn(data, user, context)`. **No es REST** (la acción viaja en el payload, no en el verbo/URL) ni
    GraphQL (no hay schema de consulta ni resolvers compuestos): es un **patrón RPC / Command Dispatcher** detrás de un
    gateway en proceso.


    ### El método HTTP real SIEMPRE es POST

    Excepto las cuatro rutas HTTP nativas: `GET /health`, `GET /info`, `GET /api/media/plantas/{file}` y `POST
    /api/plantas/upload` (multipart). Todo lo demás es `POST /api/service`.


    ### Por qué los paths llevan `#servicio`

    OpenAPI/Swagger no permite varias operaciones sobre la misma ruta y método. Para documentar cada servicio por
    separado se usa el sufijo `#modulo.accion` (p. ej. `/api/service#plants.getAll`). **Es sólo un identificador de
    Swagger: la URL real es `POST /api/service` en todos los casos** y se indica en cada operación (`x-physical-route`).


    ## Envoltura de respuesta


    Éxito:

    ```json

    { "success": true, "data": { ... }, "service": "...", "timestamp": "ISO-8601", "executionTime": 12 }

    ```

    Error:

    ```json

    { "success": false, "error": "mensaje", "code": "ER_...|null", "service": "...", "timestamp": "ISO-8601" }

    ```


    ## Autenticación y roles


    - **JWT en el body** (campo `token`), no en el header `Authorization` — salvo `POST /api/plantas/upload`, que sí usa
    `Authorization: Bearer`.

    - El despachador exige token sólo para los servicios listados en `SERVICES_REQUIRING_AUTH`, y exige rol `admin` sólo
    para los listados en `adminServices`. Jerarquía conceptual: `admin` > `collector` > `user` (en la práctica casi todo
    lo restringido exige `admin`).

    - Token válido **24 h**.


    ## Rate limiting (estado real)


    - Se aplica **un único** limiter global: **500 peticiones / 5 minutos por IP** (`RATE_LIMIT_MAX_REQUESTS` /
    `RATE_LIMIT_WINDOW_MS`). Headers estándar `RateLimit-Limit/Remaining/Reset`; al exceder, **429** con `Retry-After`.
    `GET /health` y `GET /info` están exentos.

    - ⚠️ Existen en el código limiters más estrictos para login (`strictRateLimiter`, `loginRateLimiter`) **pero NO
    están conectados** — hoy no hay límite especial para el login.


    ## Estado de los servicios (leyenda)


    Cada operación incluye `x-service-status`:

    - **ok** — funcional.

    - **stub** (`deprecated`) — registrado pero devuelve `{ success:false, "Funcionalidad pendiente" }`.

    - **broken** (`deprecated`) — handler estilo Express; **falla** al invocarse por el gateway.

    - **always403** (`deprecated`) — exige admin pero no está en la lista de autenticación → **siempre 403** (bug).


    Resumen: 97 funcionales, 15 stubs, 6 no funcionales, 3 con bug "siempre 403".


    ### Servicios registrados pero NO resolubles (404)

    Estos figuran en `services/index.js` pero su controlador es `undefined`, de modo que el despachador responde **404
    "Servicio no encontrado"**. **No se documentan como operaciones** porque, en la práctica, no existen:

    `users.uploadAvatar`, `users.getStats`, `users.deactivate`, `users.activate`, `autocomplete.collectors`.


    Además, `users.toggleStatus` aparece en las listas `SERVICES_REQUIRING_AUTH`/`adminServices` del despachador pero
    **no está registrado** en `services/index.js` → también responde 404. Y la validación de ubicación se expone como
    `validation.validateLocation` (no existe `locations.validateLocation`).


    ## Hallazgos de seguridad detectados en el código (a corregir)


    1. Operaciones de escritura sin protección: `plants.purgeDeleted`, `uploads.deleteFile`, y los
    `taxonomy.*`/`locations.*` de escritura (hoy stubs) no están en las listas del despachador.

    2. Lectura sensible expuesta: `dashboard.getSystemHealth`, `dashboard.getStorageInfo` y demás métricas del dashboard
    (salvo `getStats`/`getRecentActivity`) son públicas.

    3. Bugs de 403: `suggestions.update`, `suggestions.updateStatus`, `suggestions.getStats`, `users.toggleStatus`
    verifican admin pero no se les inyecta el usuario.

    4. `settings.get`/`settings.getSystemInfo` no verifican rol.


    ## Changelog


    - **2.0.0** — Regeneración fiel al código fuente: inventario completo de servicios del registro, ruta/método HTTP
    reales, estado por servicio (ok/stub/broken/always403), hallazgos de seguridad. OpenAPI 3.1.

    - **1.1.0 / 1.0.0** — Versiones previas (parcialmente idealizadas).
