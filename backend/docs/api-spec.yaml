  /api/service#pqrsdf.create:
    post:
      tags:
        - PQRSDF
      summary: Radicar PQRSDF (sin auth)
      operationId: pqrsdfCreate
      description: >-
        **Servicio:** `pqrsdf.create`


        **Ruta HTTP real:** `POST /api/service`  ·  **Método real:** `POST`


        **Autenticación:** No requiere autenticación.  **Rol:** cualquiera


        **Parámetros requeridos en `data`:** `tipo`, `mensaje`, `autoriza`


        Radica una PQRSDF (público). Campos: `tipo` ∈ {peticion, queja, reclamo, sugerencia, denuncia, felicitacion}
        (obligatorio); `mensaje` (obligatorio, ≥ 10 caracteres); `autoriza` (obligatorio, debe ser `true` — aceptación
        de tratamiento de datos). Si `anonimo` es `false`: `nombre` (≥ 2). Si `medio_respuesta` = `email`: `email`
        obligatorio y validado. Si `medio_respuesta` = `correo_fisico`: `direccion_correspondencia` obligatoria.
        Opcionales: `tipo_identificacion` (CC), `numero_documento`, `telefono`, `pais` (Colombia), `departamento`,
        `ciudad`, `fax`.
      x-service-name: pqrsdf.create
      x-physical-route: POST /api/service
      x-real-http-method: POST
      x-auth-required: false
      x-role-required: null
      x-service-status: ok
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceRequest'
            example:
              service: pqrsdf.create
              data:
                tipo: peticion
                mensaje: Quisiera información sobre los especímenes del herbario.
                autoriza: true
                anonimo: false
                nombre: Juan Pérez
                tipo_identificacion: CC
                numero_documento: '1234567890'
                medio_respuesta: email
                email: jperez@ejemplo.com
                departamento: Putumayo
                ciudad: Mocoa
      responses:
        '200':
          description: Devuelve el número de radicado generado (formato `PQRSDF-AAAAMMDD-00000`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
